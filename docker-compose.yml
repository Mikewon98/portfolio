services:
  watchtower:
    image: nickfedor/watchtower
    restart: unless-stopped
    command:
      - "--label-enable"
      - "--rolling-restart"
      - "--include-restarting"
      - "--stop-timeout"
      - "60s"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - REPO_USER=mikewon98
      - REPO_PASS=${GITHUB_TOKEN}
      - WATCHTOWER_NOTIFICATIONS=shoutrrr
      - WATCHTOWER_NOTIFICATION_URL=${DISCORD_WEBHOOK_URL}
  reverse-proxy:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    command:
      - "--log.level=DEBUG"
      - "--providers.docker=true"
      - "--api.insecure=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entryPoints.web.address=:80"
      - "--entryPoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=mikewon98@gmail.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--entryPoints.web.address=:80"
      - "--entryPoints.web.http.redirections.entrypoint.to=websecure"
      - "--entryPoints.web.http.redirections.entrypoint.scheme=https"
    ports:
      # The http port
      - "80:80"
      # The https port
      - "443:443"
      # The web UI ((enabled by api.insecure=true)
      # - "8080:8080"
    volumes:
      # So that Traefik can listen to docker events
      - /var/run/docker.sock:/var/run/docker.sock
      # Lets encrypt
      - letsencrypt:/letsencrypt
  blog:
    image: ghcr.io/mikewon98/blog:stable
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.blog.rule=Host(`michaelyze.com`)"
      - "traefik.http.routers.blog.entrypoints=websecure"
      - "traefik.http.services.blog.loadbalancer.server.port=3000"
      - "traefik.http.routers.blog.tls.certresolver=myresolver"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.blog-http.middlewares=redirect-to-https"
      - "traefik.http.routers.blog-http.rule=Host(`michaelyze.com`)"
      - "traefik.http.routers.blog-http.entrypoints=web"
      # Add sticky sessions to prevent Server Action mismatch (remove this if causing issues)
      - "traefik.http.services.blog.loadbalancer.sticky.cookie=true"
      - "traefik.http.services.blog.loadbalancer.sticky.cookie.name=server_id"
      - "traefik.http.services.blog.loadbalancer.sticky.cookie.secure=true"
      - "traefik.http.services.blog.loadbalancer.sticky.cookie.httpOnly=true"
      # Better cache control - allow caching of static assets
      - "traefik.http.middlewares.cache-control.headers.customresponseheaders.Cache-Control=public, max-age=3600, stale-while-revalidate=86400"
      # # Add cache control headers to prevent stale client code (replaced by the above)
      # - "traefik.http.middlewares.cache-control.headers.customresponseheaders.Cache-Control=no-cache, no-store, must-revalidate"
      - "traefik.http.routers.blog.middlewares=cache-control"
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      replicas: 3
      # update_config:
      #   parallelism: 3 # Update all replicas at once to avoid version mismatch
      #   delay: 0s
      # Replace with above if causing issues
      update_config:
      parallelism: 1 # Update one at a time
      delay: 10s # Wait 10s between updates
      order: start-first # Start new container before stopping old one
    env_file:
      - .env
volumes:
  letsencrypt:
